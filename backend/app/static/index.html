<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Project Management MVP</title>
    <style>
      body {
        font-family: "Segoe UI", sans-serif;
        margin: 0;
        background: #f7f8fb;
        color: #032147;
      }

      main {
        max-width: 720px;
        margin: 0 auto;
        padding: 64px 24px;
      }

      .card {
        margin-top: 24px;
        background: #ffffff;
        border-radius: 18px;
        padding: 20px;
        box-shadow: 0 12px 24px rgba(3, 33, 71, 0.08);
      }

      .label {
        text-transform: uppercase;
        letter-spacing: 0.25em;
        font-size: 12px;
        color: #888888;
      }
    </style>
  </head>
  <body>
    <main>
      <p class="label">Hello world</p>
      <h1>Project Management MVP</h1>
      <p>
        This static page is served by FastAPI. It calls a sample API endpoint and
        renders the response below.
      </p>
      <div class="card">
        <strong>API response</strong>
        <div id="api-result">Loading...</div>
      </div>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
